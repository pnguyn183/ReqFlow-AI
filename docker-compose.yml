services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reqflow}
      POSTGRES_USER: ${POSTGRES_USER:-reqflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reqflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reqflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-reqflow}:${POSTGRES_PASSWORD:-reqflow}@postgres:5432/${POSTGRES_DB:-reqflow}
      SECRET_KEY: ${SECRET_KEY:-reqflow-compose-development-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      REDIS_URL: redis://redis:6379/0
      MONGODB_URL: mongodb://mongodb:27017/reqflow
      QDRANT_URL: http://qdrant:6333
      CORS_ORIGINS: http://localhost:5174,http://127.0.0.1:5174
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "8001:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5174:80"

  prometheus:
    image: prom/prometheus:v3.1.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "3001:3000"

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  qdrant_data:
  grafana_data:
